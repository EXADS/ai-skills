name: Lint

on:
  pull_request:
  push:
    branches: [main]

jobs:
  skill-frontmatter:
    name: SKILL.md frontmatter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '26'
      - name: Validate SKILL.md frontmatter
        run: node scripts/validate-skills.mjs
